<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard Sostenibilidad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #e8f5e9;
            /* Fondo sutil */
            background-image: linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.9));
            color: #212121;
        }
        .navbar { background-color: #2e7d32 !important; }
        .card, .table, .alert, .chart-box {
            background-color: #fff;
            border: 1px solid #c8e6c9;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }
        .charts-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }
        .chart-box {
            flex: 1 1 45%;
            min-width: 300px;
            max-width: 600px;
            height: 300px; /* Ajustado para que no sean gigantes */
            padding: 15px;
        }
        footer {
            background-color: #2e7d32;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark p-3 d-flex justify-content-between">
        <a class="navbar-brand" href="#">LATAM Airlines - Carbono Neutralidad 2050</a>
        <div>
            <span class="text-white me-3">Hola, <span th:text="${usuario}">User</span></span>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Salir</button>
            </form>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="alert alert-success text-center">
            <h4>Huella Total: <strong th:text="${totalGlobal} + ' kg CO2e'">0</strong></h4>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5 class="mb-3">Registrar Emisión</h5>
                    
                    <form th:action="@{/guardar}" method="post">
                        <label class="form-label">Fuente</label>
                        <select name="fuente" class="form-select mb-3">
                            <option value="Vuelo">Vuelo Comercial</option>
                            <option value="Terrestre">Transporte Terrestre</option>
                            <option value="Oficina">Consumo Oficina</option>
                            <option value="Logistica">Logística</option>
                        </select>
                        
                        <label class="form-label">Consumo (kg CO2)</label>
                        <input type="number" step="0.01" name="cantidad" class="form-control mb-3" required placeholder="Ej: 150.5">
                        
                        <button type="submit" class="btn btn-success w-100">Guardar Registro</button>
                    </form>

                    <form th:action="@{/borrar}" method="post" class="mt-3">
                        <button type="submit" class="btn btn-outline-danger w-100 btn-sm">Borrar Todo</button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card p-3 mb-4">
                    <h5 class="mb-3">Historial de Registros</h5>
                    <table class="table table-striped table-hover" id="tabla-emisiones">
                        <thead class="table-success">
                            <tr>
                                <th>Fecha</th>
                                <th>Fuente</th>
                                <th>Cantidad (kg CO2)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="emision : ${emisiones}">
                                <td th:text="${emision.fecha}">2023-01-01</td>
                                <td th:text="${emision.fuente}">Fuente</td>
                                <td class="dato-co2 fw-bold text-success" th:text="${emision.cantidadCO2}">0.0</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div class="charts-row">
                    <div class="chart-box">
                        <h6 class="text-center">Por Fuente (Barras)</h6>
                        <canvas id="graficoBarras"></canvas>
                    </div>
                    <div class="chart-box">
                        <h6 class="text-center">Proporción (Pie)</h6>
                        <canvas id="graficoPie"></canvas>
                    </div>
                    <div class="chart-box">
                        <h6 class="text-center">Tendencia (Línea)</h6>
                        <canvas id="graficoLinea"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Gerencia de Sostenibilidad de LATAM Airlines<br>
        Plataforma Corporativa v2.0
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const tabla = document.getElementById('tabla-emisiones');
            const filas = tabla.querySelectorAll('tbody tr');

            const fuentes = {};
            const fechas = [];
            const datosLinea = [];

            filas.forEach(fila => {
                // Columnas: 0=Fecha, 1=Fuente, 2=Cantidad
                const fecha = fila.cells[0].innerText.trim();
                const fuente = fila.cells[1].innerText.trim();
                const co2 = parseFloat(fila.cells[2].innerText.trim());

                // Agrupar por fuente para el Pie/Barras
                fuentes[fuente] = (fuentes[fuente] || 0) + co2;

                // Datos lineales
                fechas.push(fecha);
                datosLinea.push(co2);
            });

            const labelsFuentes = Object.keys(fuentes);
            const datosFuentes = Object.values(fuentes);

            // 1. Gráfico de Barras
            new Chart(document.getElementById('graficoBarras'), {
                type: 'bar',
                data: { 
                    labels: labelsFuentes, 
                    datasets: [{ label: 'Total kg CO2', data: datosFuentes, backgroundColor: '#2e7d32' }] 
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 2. Gráfico de Pie
            new Chart(document.getElementById('graficoPie'), {
                type: 'doughnut', // Doughnut se ve más moderno que Pie
                data: { 
                    labels: labelsFuentes, 
                    datasets: [{ data: datosFuentes, backgroundColor: ['#66bb6a','#43a047','#2e7d32','#1b5e20','#a5d6a7'] }] 
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 3. Gráfico de Línea
            new Chart(document.getElementById('graficoLinea'), {
                type: 'line',
                data: { 
                    labels: fechas, 
                    datasets: [{ label: 'Historial', data: datosLinea, borderColor: '#1b5e20', tension: 0.3 }] 
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        });
    </script>
</body>
</html>
